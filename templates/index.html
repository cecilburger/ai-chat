<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garuda Food Chatbot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(214, 43, 39, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 100, 0, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(214, 43, 39, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .chat-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 860px;
      background: rgba(15, 15, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(214, 43, 39, 0.2), 0 0 120px rgba(0,0,0,0.8);
    }

    /* Header */
    .chat-header {
      padding: 16px 20px;
      background: rgba(20, 20, 28, 0.9);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #d62b27, #ff6b35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(214, 43, 39, 0.5);
    }

    .header-info { flex: 1; }

    .header-info h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.2px;
    }

    .header-info .status {
      font-size: 11px;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .live-badge {
      background: linear-gradient(135deg, #d62b27, #ff4444);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 1px;
      animation: pulse-red 1.5s infinite;
      box-shadow: 0 0 10px rgba(214, 43, 39, 0.6);
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 10px rgba(214, 43, 39, 0.6); }
      50% { box-shadow: 0 0 20px rgba(214, 43, 39, 0.9); }
    }

    .voice-toggle {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: white;
    }
    .voice-toggle:hover { background: rgba(255,255,255,0.12); }
    .voice-toggle.muted { opacity: 0.35; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 24px 16px 8px;
    }

    .welcome-emoji {
      font-size: 40px;
      margin-bottom: 10px;
      display: block;
    }

    .welcome h2 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .welcome p {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion-btn {
      background: rgba(214, 43, 39, 0.12);
      border: 1px solid rgba(214, 43, 39, 0.3);
      color: rgba(255,255,255,0.8);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      background: rgba(214, 43, 39, 0.3);
      border-color: rgba(214, 43, 39, 0.6);
      color: #fff;
      transform: translateY(-1px);
    }

    /* Messages */
    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
    }

    .message.bot .avatar {
      background: linear-gradient(135deg, #d62b27, #ff6b35);
      box-shadow: 0 0 10px rgba(214, 43, 39, 0.4);
    }

    .message.user .avatar {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.bot .bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #d62b27, #e83a36);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(214, 43, 39, 0.35);
    }

    /* Typing */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 2px 0;
      align-items: center;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input */
    .input-area {
      padding: 12px 16px 16px;
      background: rgba(20, 20, 28, 0.9);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      backdrop-filter: blur(10px);
    }

    .input-wrap {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(214, 43, 39, 0.5);
      box-shadow: 0 0 0 3px rgba(214, 43, 39, 0.08);
    }

    .input-wrap textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.5;
      max-height: 100px;
    }

    .input-wrap textarea::placeholder { color: rgba(255,255,255,0.25); }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      background: linear-gradient(135deg, #d62b27, #ff4444);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(214, 43, 39, 0.4);
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(214, 43, 39, 0.55);
    }

    .send-btn:disabled {
      background: rgba(255,255,255,0.08);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="logo">G</div>
      <div class="header-info">
        <h1>Garuda Food Assistant</h1>
        <div class="status">
          <span class="status-dot"></span>
          Online sekarang
        </div>
      </div>
      <span class="live-badge">LIVE</span>
      <button class="voice-toggle" id="voiceBtn" onclick="toggleVoice()" title="Toggle voice">🔊</button>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <span class="welcome-emoji">🥜🍫</span>
        <h2>Halo! Selamat datang</h2>
        <p>Tanya apa aja soal snack GarudaFood ya!</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Snack apa aja?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Kacang Garuda</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Chocolatos rasa apa?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Rekomendasi manis</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="Tanya soal snack GarudaFood..."
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    // ── Voice (ElevenLabs TTS) ───────────────────────────────────────────
    let voiceEnabled = true;
    let currentAudio = null;
    let isSpeaking = false;
    const messageQueue = []; // { username, question, answer }

    function toggleVoice() {
      voiceEnabled = !voiceEnabled;
      const btn = document.getElementById("voiceBtn");
      btn.textContent = voiceEnabled ? "🔊" : "🔇";
      btn.classList.toggle("muted", !voiceEnabled);
      if (!voiceEnabled && currentAudio) {
        currentAudio.pause();
        currentAudio = null;
        isSpeaking = false;
      }
    }

    // Fetch TTS audio and return a promise that resolves when audio finishes
    function fetchAndPlay(text) {
      return new Promise(async (resolve) => {
        if (!voiceEnabled) return resolve();
        try {
          const res = await fetch("/tts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          if (!res.ok) return resolve();
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          if (currentAudio) currentAudio.pause();
          currentAudio = new Audio(url);
          currentAudio.onended = resolve;
          currentAudio.onerror = resolve;
          currentAudio.play();
        } catch (_) { resolve(); }
      });
    }

    // Process queue one at a time — read comment first, then answer
    async function processQueue() {
      if (isSpeaking || messageQueue.length === 0) return;
      isSpeaking = true;
      const { username, question, answer } = messageQueue.shift();

      // 1. Read the comment aloud: "[username] nanya: [question]"
      const readComment = `${username} nanya: ${question}`;
      await fetchAndPlay(readComment);

      // 2. Then read the answer
      await fetchAndPlay(answer);

      isSpeaking = false;
      processQueue(); // next in queue
    }

    function enqueueSpeak(username, question, answer) {
      if (!voiceEnabled) return;
      messageQueue.push({ username, question, answer });
      processQueue();
    }
    // ────────────────────────────────────────────────────────────────────

    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("userInput");
    const sendBtn    = document.getElementById("sendBtn");
    let conversationHistory = [];
    let isStreaming = false;
    let pendingQueue = []; // queue of {text, username} waiting to be processed
    let isProcessingChat = false;

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 100) + "px";
    }

    function handleKeyDown(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendSuggestion(btn) {
      inputEl.value = btn.textContent;
      sendMessage();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendMessage(role, text, username) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      const label = role === "bot" ? "G" : (username ? username[0].toUpperCase() : "U");
      div.innerHTML = `
        <div class="avatar">${label}</div>
        <div class="bubble">${escapeHtml(text)}</div>
      `;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div.querySelector(".bubble");
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "message bot";
      div.id = "typing";
      div.innerHTML = `
        <div class="avatar">G</div>
        <div class="bubble">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      inputEl.style.height = "auto";
      // Use "Kak" as default username for manual input
      pendingQueue.push({ text, username: "Kak" });
      processChatQueue();
    }

    async function processChatQueue() {
      if (isProcessingChat || pendingQueue.length === 0) return;
      isProcessingChat = true;

      const { text, username } = pendingQueue.shift();

      conversationHistory.push({ role: "user", content: text });
      appendMessage("user", text, username);
      showTyping();

      let botBubble = null;
      let botText = "";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          for (const line of chunk.split("\n")) {
            if (!line.startsWith("data: ")) continue;
            const raw = line.slice(6).trim();
            if (raw === "[DONE]") break;
            try {
              const { text: delta } = JSON.parse(raw);
              if (delta) {
                if (!botBubble) {
                  removeTyping();
                  botBubble = appendMessage("bot", "");
                }
                botText += delta;
                botBubble.textContent = botText;
                scrollToBottom();
              }
            } catch (_) {}
          }
        }

        if (botText) {
          conversationHistory.push({ role: "assistant", content: botText });
          // Enqueue voice: read comment first, then answer
          enqueueSpeak(username, text, botText);
        }
      } catch (err) {
        removeTyping();
        appendMessage("bot", "Maaf kak, ada gangguan. Coba lagi ya! 😊");
        conversationHistory.pop();
      } finally {
        isProcessingChat = false;
        processChatQueue(); // process next in queue
      }
    }
    // ── TikTok Live integration hook ─────────────────────────────────────
    // Call this from external TikTok Live connector:
    // receiveComment("username123", "chocolatos ada rasa apa?")
    function receiveComment(username, text) {
      pendingQueue.push({ text, username });
      processChatQueue();
    }
    // ────────────────────────────────────────────────────────────────────
  </script>
</body>
</html>
